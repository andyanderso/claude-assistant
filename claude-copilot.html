<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0C0F14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Copilot — talk to Claude</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C0F14; --bg2:#11151C; --line:#1E242E;
    --ink:#ECEFF3; --muted:#7C8794;
    --amber:#F3A93C;   /* resting / dashboard glow */
    --teal:#2FD3A5;    /* listening */
    --blue:#5AA2FF;    /* speaking */
    --rose:#FF6B6B;    /* error / stop */
    --state:var(--amber);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{
    background:radial-gradient(120% 90% at 50% -10%, #131922 0%, var(--bg) 55%);
    color:var(--ink); font-family:Inter,system-ui,sans-serif;
    display:flex; flex-direction:column;
    padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
    overflow:hidden; user-select:none;
  }

  /* top bar */
  .top{display:flex; align-items:center; justify-content:space-between; gap:12px}
  .brand{font-family:'Chakra Petch',sans-serif; font-weight:700; letter-spacing:.16em;
    text-transform:uppercase; font-size:13px; color:var(--muted)}
  .brand b{color:var(--state); transition:color .4s ease}
  .gear{appearance:none; border:1px solid var(--line); background:var(--bg2); color:var(--muted);
    width:42px; height:42px; border-radius:12px; font-size:18px; display:grid; place-items:center; cursor:pointer}
  .gear:active{transform:scale(.94)}
  .topright{display:flex; align-items:center; gap:10px}
  .modelchip{font-family:'Chakra Petch',sans-serif; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--state); border:1px solid color-mix(in srgb,var(--state) 40%,var(--line)); padding:6px 10px; border-radius:999px; transition:color .4s ease,border-color .4s ease}

  /* center stage */
  .stage{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px}
  .orb-wrap{position:relative; width:min(62vw,260px); aspect-ratio:1; display:grid; place-items:center}
  .ring{position:absolute; inset:0; border-radius:50%; border:2px solid var(--state); opacity:.18; transition:border-color .4s ease}
  .orb{
    position:relative; width:64%; aspect-ratio:1; border-radius:50%; cursor:pointer;
    background:radial-gradient(circle at 50% 38%, color-mix(in srgb,var(--state) 70%, #fff 0%) 0%, var(--state) 42%, color-mix(in srgb,var(--state) 40%, #000 60%) 100%);
    box-shadow:0 0 0 1px color-mix(in srgb,var(--state) 60%,#000), 0 0 60px -6px var(--state), inset 0 -14px 40px -10px rgba(0,0,0,.55);
    transition:transform .25s ease;
  }
  .orb:active{transform:scale(.95)}

  .statusword{font-family:'Chakra Petch',sans-serif; font-weight:600; text-transform:uppercase;
    letter-spacing:.22em; font-size:18px; color:var(--state); transition:color .4s ease; min-height:22px; text-align:center}
  .hint{color:var(--muted); font-size:14px; text-align:center; max-width:300px; line-height:1.45; min-height:20px}

  /* hands-free toggle */
  .hf{display:flex; align-items:center; gap:10px; padding:9px 16px; border:1px solid var(--line);
    border-radius:999px; background:var(--bg2); cursor:pointer; font-size:14px; color:var(--muted)}
  .hf.on{color:var(--teal); border-color:color-mix(in srgb,var(--teal) 45%,var(--line))}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--muted)}
  .hf.on .dot{background:var(--teal); box-shadow:0 0 10px var(--teal)}

  /* transcript */
  .scroll{max-height:30vh; overflow-y:auto; width:100%; max-width:560px; margin:0 auto;
    display:flex; flex-direction:column; gap:10px; padding:4px 2px 2px; -webkit-overflow-scrolling:touch}
  .scroll::-webkit-scrollbar{width:0}
  .msg{padding:12px 15px; border-radius:16px; font-size:16px; line-height:1.5; max-width:88%; word-wrap:break-word}
  .me{align-self:flex-end; background:#1B222C; color:var(--ink); border-bottom-right-radius:5px}
  .ai{align-self:flex-start; background:transparent; color:var(--ink); border:1px solid var(--line); border-bottom-left-radius:5px}
  .sources{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; padding-top:9px; border-top:1px solid var(--line)}
  .src{font-size:12px; color:var(--blue); text-decoration:none; background:rgba(90,162,255,.09);
    border:1px solid rgba(90,162,255,.25); padding:4px 9px; border-radius:8px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .src:active{opacity:.7}
  .conf{display:inline-block; font-family:'Chakra Petch',sans-serif; font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; font-weight:600; padding:3px 9px; border-radius:7px; margin-bottom:9px}
  .conf-high{color:#06231b; background:var(--teal)}
  .conf-moderate{color:#2e2205; background:var(--amber)}
  .conf-low{color:#2a0d0d; background:var(--rose)}
  .empty{color:var(--muted); text-align:center; font-size:14px; padding:18px}

  /* state animations */
  @keyframes breathe{0%,100%{transform:scale(.97);opacity:.95}50%{transform:scale(1.03);opacity:1}}
  @keyframes ripple{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.25);opacity:0}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{transform:scale(.96)}50%{transform:scale(1.05)}}

  body[data-state="idle"]{--state:var(--amber)}
  body[data-state="idle"] .orb{animation:breathe 4.5s ease-in-out infinite}

  body[data-state="listening"]{--state:var(--teal)}
  body[data-state="listening"] .orb{animation:pulse 1.1s ease-in-out infinite}
  body[data-state="listening"] .ring{animation:ripple 1.8s ease-out infinite}
  body[data-state="listening"] .ring.r2{animation-delay:.6s}
  body[data-state="listening"] .ring.r3{animation-delay:1.2s}

  body[data-state="thinking"]{--state:var(--amber)}
  body[data-state="thinking"] .ring.r1{border-color:transparent; border-top-color:var(--state); opacity:.9; animation:spin 1s linear infinite}
  body[data-state="thinking"] .orb{opacity:.6}

  body[data-state="speaking"]{--state:var(--blue)}
  body[data-state="speaking"] .orb{animation:pulse .7s ease-in-out infinite}

  body[data-state="error"]{--state:var(--rose)}

  body:not([data-state="listening"]) .ring:not(.r1){opacity:.1; animation:none}

  /* settings sheet */
  .sheet{position:fixed; inset:0; background:rgba(6,8,11,.72); backdrop-filter:blur(6px);
    display:none; align-items:flex-end; z-index:20}
  .sheet.open{display:flex}
  .panel{background:var(--bg2); width:100%; max-width:560px; margin:0 auto; border-radius:20px 20px 0 0;
    border:1px solid var(--line); padding:20px 18px max(20px,env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:14px}
  .panel h2{font-family:'Chakra Petch',sans-serif; font-size:15px; letter-spacing:.12em; text-transform:uppercase; margin:0; color:var(--ink)}
  label{font-size:13px; color:var(--muted); display:block; margin-bottom:6px}
  input,select,textarea{width:100%; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    border-radius:11px; padding:12px 13px; font-size:15px; font-family:inherit}
  textarea{resize:vertical; min-height:70px; line-height:1.4}
  .row{display:flex; gap:10px}
  .row>div{flex:1}
  .btn{appearance:none; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:600;
    font-family:inherit; cursor:pointer}
  .btn.primary{background:var(--teal); color:#06231b}
  .btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--line)}
  .note{font-size:12px; color:var(--muted); line-height:1.5}
  .note code{background:var(--bg); padding:1px 5px; border-radius:5px; color:var(--ink)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body data-state="idle">

  <div class="top">
    <div class="brand">Co<b>pilot</b></div>
    <div class="topright">
      <span class="modelchip" id="modelchip" style="display:none"></span>
      <button class="gear" id="gear" aria-label="Settings">⚙</button>
    </div>
  </div>

  <div class="stage">
    <div class="orb-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="orb" id="orb" role="button" aria-label="Tap to talk"></div>
    </div>
    <div class="statusword" id="statusword">Tap to talk</div>
    <div class="hint" id="hint">Tap the orb and start speaking.</div>
    <button class="hf on" id="hf"><span class="dot"></span><span id="hfLabel">Hands-free on</span></button>
  </div>

  <div class="scroll" id="scroll">
    <div class="empty" id="empty">Your conversation will show here.</div>
  </div>

  <!-- settings -->
  <div class="sheet" id="sheet">
    <div class="panel">
      <h2>Settings</h2>
      <div>
        <label for="key">Anthropic API key</label>
        <input id="key" type="password" placeholder="sk-ant-..." autocomplete="off" />
      </div>
      <div class="row">
        <div>
          <label for="model">Model</label>
          <select id="model">
            <option value="auto" selected>Auto — pick per question</option>
            <option value="claude-haiku-4-5-20251001">Haiku 4.5 — fastest</option>
            <option value="claude-sonnet-4-6">Sonnet 4.6 — balanced</option>
            <option value="claude-opus-4-8">Opus 4.8 — smartest</option>
          </select>
        </div>
        <div>
          <label for="voice">Voice</label>
          <select id="voice"></select>
        </div>
      </div>
      <button type="button" class="hf on" id="ground" style="align-self:flex-start">
        <span class="dot"></span><span id="groundLabel">Grounding on</span>
      </button>
      <div>
        <label for="sys">How Claude should talk</label>
        <textarea id="sys"></textarea>
        <button type="button" id="resetSys" style="appearance:none;background:none;border:none;color:var(--blue);font-size:13px;padding:8px 0 0;cursor:pointer">Reset to default (grounding + confidence cue)</button>
      </div>
      <p class="note">Your key is stored only on this device and sent straight to Anthropic. For real driving use, open this page in Chrome and choose <code>Add to Home screen</code> so the mic works and it launches like an app.</p>
      <button class="btn primary" id="save">Save</button>
      <button class="btn ghost" id="clear">Clear conversation</button>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---- tiny safe storage (works standalone; degrades gracefully in sandboxes) ----
  const mem = {};
  const store = {
    get(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k] ?? null; } },
    set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
  };

  const DEFAULT_SYS =
    "You are a voice copilot the user talks to while driving, and you prioritize accuracy and well-sourced answers. " +
    "GROUNDING: When a question turns on facts, current information, data, science, health, or anything checkable, use web search and rely on the most reputable sources you can find — peer-reviewed research, primary data, government and academic institutions, and established expert outlets — over blogs, forums, marketing, or SEO content. Prefer primary sources over summaries of them. " +
    "RELIABILITY: Tell the user how solid the basis is. Flag out loud when a source is weak, contested, preliminary (a preprint or a single small study), anecdotal, or when experts disagree, and distinguish established consensus from early or fringe findings. If the evidence is thin or you're unsure, say so plainly instead of sounding confident. Never invent studies, statistics, quotes, or citations — if you can't find real support, say that. " +
    "CONFIDENCE: Begin every factual or checkable answer by speaking one short confidence cue first — 'High confidence' when it's well established and backed by strong reputable sources, 'Moderate confidence' when support is reasonable but limited or partial, or 'Low confidence' when the evidence is thin, contested, preliminary, or from memory without solid sourcing — then a dash and your answer. Skip the cue entirely for casual conversation, greetings, or chit-chat. " +
    "VOICE: Keep replies short and conversational, usually one to three sentences, the way a person speaks — no markdown, lists, headings, or emoji, since everything is read aloud. Attribute naturally out loud ('a 2024 review in Nature found…', 'according to NOAA…') and describe reliability in words; the screen shows the source links, so don't read URLs aloud. Lead with the key point, then offer to go deeper. Don't search for casual conversation or chit-chat.";

  const $ = id => document.getElementById(id);
  const body = document.body;
  const orb = $('orb'), statusword = $('statusword'), hint = $('hint');
  const scroll = $('scroll'), empty = $('empty');
  const sheet = $('sheet');
  const keyEl=$('key'), modelEl=$('model'), voiceEl=$('voice'), sysEl=$('sys');
  const hfBtn=$('hf'), hfLabel=$('hfLabel');
  const groundBtn=$('ground'), groundLabel=$('groundLabel');

  let state='idle';
  let handsFree = store.get('hf') !== '0';
  let ground = store.get('ground') !== '0';
  let messages = [];            // {role, content}
  let recog=null, recognizing=false, finalText='';
  let voices=[], chosenVoice='';

  // ---- load settings ----
  keyEl.value = store.get('key') || '';
  modelEl.value = store.get('model') || 'auto';
  sysEl.value = store.get('sys') || DEFAULT_SYS;
  chosenVoice = store.get('voice') || '';
  setHandsFree(handsFree, true);
  setGround(ground);

  // ---- speech synthesis (talk back) ----
  const synth = window.speechSynthesis;
  function loadVoices(){
    voices = synth ? synth.getVoices() : [];
    const en = voices.filter(v=>/^en/i.test(v.lang));
    const list = en.length ? en : voices;
    voiceEl.innerHTML = '<option value="">Default</option>' +
      list.map(v=>`<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
    if(chosenVoice) voiceEl.value = chosenVoice;
  }
  if(synth){ loadVoices(); synth.onvoiceschanged = loadVoices; }

  function speak(text, done){
    if(!synth){ done&&done(); return; }
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = voices.find(x=>x.name===chosenVoice);
    if(v) u.voice=v;
    u.rate=1.02; u.pitch=1;
    u.onend = ()=>done&&done();
    u.onerror = ()=>done&&done();
    setState('speaking');
    synth.speak(u);
  }

  // ---- speech recognition (listen) ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  function buildRecog(){
    if(!SR) return null;
    const r = new SR();
    r.lang='en-US'; r.interimResults=true; r.continuous=false; r.maxAlternatives=1;
    r.onstart = ()=>{ recognizing=true; finalText=''; };
    r.onresult = (e)=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal) finalText+=t; else interim+=t;
      }
      hint.textContent = (finalText||interim||'').slice(0,120) || 'Listening…';
    };
    r.onerror = (e)=>{
      recognizing=false;
      if(e.error==='not-allowed' || e.error==='service-not-allowed'){
        setState('error'); statusword.textContent='Mic blocked';
        hint.textContent='Allow microphone access, or open this page directly in Chrome.';
        return;
      }
      if(e.error==='no-speech'){
        if(handsFree && state==='listening'){ startListening(); return; }
      }
      setState('idle');
    };
    r.onend = ()=>{
      recognizing=false;
      const said = finalText.trim();
      if(said){ turn(said); }
      else if(state==='listening'){ setState('idle'); }
    };
    return r;
  }

  function startListening(){
    if(!SR){
      setState('error'); statusword.textContent='No speech support';
      hint.textContent='Use Chrome on Android for voice. (Firefox/iOS Safari lack live speech-to-text.)';
      return;
    }
    if(synth) synth.cancel();
    setState('listening'); hint.textContent='Listening…';
    recog = buildRecog();
    try{ recog.start(); }catch(e){ /* already started */ }
  }

  function stopListening(){
    if(recog && recognizing){ try{ recog.stop(); }catch(e){} }
  }

  // ---- model routing ----
  const M_HAIKU='claude-haiku-4-5-20251001', M_SONNET='claude-sonnet-4-6', M_OPUS='claude-opus-4-8';

  function chooseModel(text){
    const t = text.toLowerCase().trim();
    const n = t.split(/\s+/).filter(Boolean).length;
    const heavy = /(analyz|compare|comparison|trade-?off|pros and cons|strateg|derive|prove|debug|algorithm|optimi[sz]e|refactor|architect|implication|step by step|walk me through|explain why|reason through|break down|weigh|nuance|forecast model)/;
    const codey = /(\bcode\b|function|regex|python|javascript|kotlin|typescript|\bsql\b|stack trace|error message|compile|syntax|payload|drupal|backdrop)/;
    const mathy = /(\d+\s*[\+\-\*\/\^%]\s*\d+|calculate|equation|integral|derivative|solve for|probability|permutation|pace|splits?)/;
    const quick = /^(what('| i)?s|what is|who('| i)?s|who is|when|where|how (far|long|much|many|old|tall|fast)|convert|define|spell|translate|remind|hey|hi|hello|thanks|thank you|yes|no|stop|repeat|say that again)\b/;
    if (heavy.test(t) || codey.test(t) || mathy.test(t) || n > 45) return M_OPUS;
    if (quick.test(t) && n <= 12) return M_HAIKU;
    return M_SONNET;
  }
  function pickModel(text){
    const setting = store.get('model') || 'auto';
    return setting === 'auto' ? chooseModel(text) : setting;
  }
  function shortName(m){
    if(m.indexOf('haiku')>-1) return 'Haiku';
    if(m.indexOf('opus')>-1) return 'Opus';
    if(m.indexOf('sonnet')>-1) return 'Sonnet';
    return m;
  }
  function showModel(m){
    const chip=document.getElementById('modelchip');
    chip.textContent=shortName(m); chip.style.display='inline-block';
  }

  // ---- a conversational turn ----
  async function turn(userText){
    addMsg('user', userText);
    messages.push({role:'user', content:userText});
    if(messages.length>20) messages = messages.slice(-20);

    const key = (store.get('key')||'').trim();
    if(!key){
      const m="Add your Anthropic API key in settings first.";
      addMsg('assistant', m); speak(m, ()=>setState('idle')); openSheet(); return;
    }

    const picked = pickModel(userText);
    showModel(picked);
    setState('thinking'); hint.textContent = ground ? 'Checking sources…' : 'Thinking…';
    try{
      const reqBody = {
        model: picked,
        max_tokens: 1024,
        system: store.get('sys')||DEFAULT_SYS,
        messages
      };
      if(ground){
        reqBody.tools = [{ type:'web_search_20250305', name:'web_search', max_uses:5 }];
      }
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'content-type':'application/json',
          'x-api-key':key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify(reqBody)
      });
      if(!res.ok){
        const errTxt = await res.text();
        let msg = 'Something went wrong ('+res.status+').';
        if(res.status===401) msg='That API key was rejected. Check it in settings.';
        if(res.status===429) msg='Rate limited — give it a second and try again.';
        console.error('Claude API error', res.status, errTxt);
        addMsg('assistant', msg); speak(msg, finishTurn); return;
      }
      const data = await res.json();
      const blocks = data.content || [];
      const reply = blocks.filter(b=>b.type==='text').map(b=>b.text).join(' ').trim()
                    || "I didn't catch a response.";
      const sources = extractSources(blocks);
      const conf = confidenceOf(reply);
      const shown = conf ? reply.replace(/^\s*(high|moderate|low)\s+confidence\s*[—–\-:]*\s*/i,'') : reply;
      messages.push({role:'assistant', content:reply});
      addMsg('assistant', shown, sources, conf);
      speak(reply, finishTurn);
    }catch(err){
      console.error(err);
      const m = "I couldn't reach the network. Check your connection.";
      addMsg('assistant', m); speak(m, finishTurn);
    }
  }

  function finishTurn(){
    if(handsFree) startListening();
    else { setState('idle'); hint.textContent='Tap the orb to reply.'; }
  }

  // ---- UI helpers ----
  function setState(s){
    state=s; body.dataset.state=s;
    statusword.textContent =
      s==='listening'?'Listening':
      s==='thinking'?'Thinking':
      s==='speaking'?'Speaking':
      s==='error'?'Error':'Tap to talk';
  }

  function extractSources(blocks){
    const out=[], seen=new Set();
    const add=(url,title)=>{ if(url && !seen.has(url)){ seen.add(url); out.push({url, title:title||domainOf(url)}); } };
    (blocks||[]).forEach(b=>{
      if(b.type==='text' && Array.isArray(b.citations))
        b.citations.forEach(c=>add(c.url, c.title));
      if(b.type==='web_search_tool_result' && Array.isArray(b.content))
        b.content.forEach(r=>add(r.url, r.title));
    });
    return out.slice(0,6);
  }
  function domainOf(url){ try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return url; } }

  function confidenceOf(text){
    const m = (text||'').match(/^\s*(high|moderate|low)\s+confidence\b/i);
    return m ? m[1].toLowerCase() : null;
  }

  function addMsg(role, text, sources, conf){
    empty.style.display='none';
    const d=document.createElement('div');
    d.className='msg '+(role==='user'?'me':'ai');
    if(conf){
      const c=document.createElement('span');
      c.className='conf conf-'+conf;
      c.textContent = conf+' confidence';
      d.appendChild(c); d.appendChild(document.createElement('br'));
    }
    d.appendChild(document.createTextNode(text));
    if(sources && sources.length){
      const box=document.createElement('div');
      box.className='sources';
      sources.forEach(s=>{
        const a=document.createElement('a');
        a.href=s.url; a.target='_blank'; a.rel='noopener';
        a.className='src'; a.textContent=domainOf(s.url);
        a.title=s.title;
        box.appendChild(a);
      });
      d.appendChild(box);
    }
    scroll.appendChild(d);
    scroll.scrollTop=scroll.scrollHeight;
  }

  function setHandsFree(on, silent){
    handsFree=on; store.set('hf', on?'1':'0');
    hfBtn.classList.toggle('on', on);
    hfLabel.textContent = on?'Hands-free on':'Hands-free off';
  }

  function setGround(on){
    ground=on; store.set('ground', on?'1':'0');
    groundBtn.classList.toggle('on', on);
    groundLabel.textContent = on?'Grounding on':'Grounding off';
  }

  // ---- interactions ----
  function tap(){
    if(state==='idle' || state==='error') startListening();
    else if(state==='listening') stopListening();          // stop & process what was heard
    else if(state==='speaking'){ if(synth) synth.cancel(); startListening(); } // barge in
    // thinking: ignore
  }
  orb.addEventListener('click', tap);

  hfBtn.addEventListener('click', ()=>setHandsFree(!handsFree));
  groundBtn.addEventListener('click', ()=>setGround(!ground));
  $('resetSys').addEventListener('click', ()=>{ sysEl.value = DEFAULT_SYS; });

  // settings sheet
  function openSheet(){ sheet.classList.add('open'); }
  $('gear').addEventListener('click', openSheet);
  sheet.addEventListener('click', e=>{ if(e.target===sheet) sheet.classList.remove('open'); });
  $('save').addEventListener('click', ()=>{
    store.set('key', keyEl.value.trim());
    store.set('model', modelEl.value);
    store.set('sys', sysEl.value.trim()||DEFAULT_SYS);
    chosenVoice = voiceEl.value; store.set('voice', chosenVoice);
    sheet.classList.remove('open');
  });
  $('clear').addEventListener('click', ()=>{
    messages=[]; scroll.querySelectorAll('.msg').forEach(n=>n.remove());
    empty.style.display='block'; sheet.classList.remove('open'); setState('idle');
  });

  // keep screen awake while driving (best-effort)
  let wl=null;
  async function keepAwake(){ try{ if('wakeLock' in navigator) wl=await navigator.wakeLock.request('screen'); }catch(e){} }
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') keepAwake(); });
  document.body.addEventListener('click', keepAwake, {once:true});

})();
</script>
</body>
</html>
